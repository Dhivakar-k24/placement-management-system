<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — PlaceTrack</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="public-page">
  <div class="login-wrap" style="max-width:460px;">
    <div class="login-logo">
      <div class="login-logo-name">📋 PlaceTrack</div>
      <div class="login-logo-sub">Student Registration</div>
    </div>
    <div class="login-card">
      <div class="login-title">Create Account</div>
      <div class="login-hint">Register to access your placement dashboard</div>

      {% if error %}
        <div class="login-error">❌ {{ error }}</div>
      {% endif %}

      <form method="POST" action="{{ url_for('register') }}">
        <div class="login-field">
          <label>Full Name</label>
          <input type="text" name="name" placeholder="e.g. Dhiva K" required>
        </div>
        <div class="login-field">
          <label>Email Address</label>
          <input type="email" name="email" placeholder="your@email.com" required>
        </div>
        <div class="login-field">
          <label>Department</label>
          <select name="department" required style="width:100%;padding:12px 16px;background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.12);border-radius:8px;color:white;font-size:0.92rem;font-family:'DM Sans',sans-serif;outline:none;">
            <option value="" disabled selected style="color:#333;">Select Department</option>
            <option value="AIML">AIML</option>
            <option value="CSE">CSE</option>
            <option value="IT">IT</option>
            <option value="ECE">ECE</option>
            <option value="EEE">EEE</option>
            <option value="MECH">MECH</option>
            <option value="CIVIL">CIVIL</option>
          </select>
        </div>
        <div class="login-field">
          <label>CGPA (0.0 – 10.0)</label>
          <input type="number" name="cgpa" step="0.1" min="0" max="10" placeholder="e.g. 8.5" required>
        </div>
        <div class="login-field">
          <label>Skills (comma-separated)</label>
          <input type="text" name="skills" placeholder="e.g. Python, SQL, Machine Learning">
        </div>
        <div class="login-field">
          <label>Password</label>
          <input type="password" name="password" placeholder="Min. 6 characters" required minlength="6">
        </div>
        <div class="login-field">
          <label>Confirm Password</label>
          <input type="password" name="confirm_password" placeholder="Re-enter password" required>
        </div>
        <button type="submit" class="login-submit">Create Account →</button>
      </form>
      <div class="login-footer-link">
        Already have an account? <a href="{{ url_for('login') }}">Login here</a>
      </div>
    </div>
  </div>
</div>
</body>
</html>
